<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final Support</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #141418;
      --text: #f3f3f1;
      --muted: #b7b7b2;
      --line: rgba(255,255,255,0.08);
      --accent: #f8c84d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #1a1b20 0%, var(--bg) 42%);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .card {
      background: rgba(20,20,24,0.88);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(12px);
    }
    h1 { margin: 0 0 16px; line-height: 1.15; font-size: 42px; }
    p, li { color: var(--muted); font-size: 16px; }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(248,200,77,0.12);
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 18px;
    }
    a { color: var(--text); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="badge">Final</div>
      <h1>Support</h1>
      <p>If you need help with Final, email us and include your device model, iOS version, and a short description of the issue.</p>
      <p><a href="mailto:support@finalwallpaper.com">support@finalwallpaper.com</a></p>
    </section>
  </main>
</body>
</html>
